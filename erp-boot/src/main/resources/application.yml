server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: erp-boot
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://rm-7xv22wl0ssfi3jlx3fo.mysql.rds.aliyuncs.com:3306/repdb?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: xdfbb8lo00%GW$452
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: false
        login-username: admin
        login-password: admin

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.erp.pojo
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: false
    # 打印 SQL 到控制台
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 打印完整的 SQL（包含参数）
    cache-enabled: false
    call-setters-on-nulls: true

knife4j:
  enable: true
  setting:
    language: zh-CN

logging:
  level:
    root: info
    com.erp: debug
    # 打印 Mapper SQL 执行日志
    com.erp.mapper: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"